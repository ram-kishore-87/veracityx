<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeracityX Analyzer</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 VeracityX</h1>
            <p>Misinformation Detector</p>
        </div>

        <div class="settings" id="settingsPanel">
            <label for="apiUrl">API URL:</label>
            <input type="text" id="apiUrl" placeholder="http://127.0.0.1:8000">
            <button id="saveSettings">Save Settings</button>
        </div>

        <div class="controls">
            <button id="analyzeBtn" class="btn-primary">🔎 Analyze This Page</button>
            <button id="selectText" class="btn-secondary">✏️ Analyze Selected Text</button>
        </div>

        <div id="results" class="results hidden">
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Analyzing...</p>
            </div>

            <div id="analysisResult" class="analysis-result hidden">
                <div class="result-header">
                    <h3>Analysis Results</h3>
                    <button id="closeResult" class="close-btn">✕</button>
                </div>

                <div class="credibility-score">
                    <div class="score-circle">
                        <span id="credibilityScore">--</span>
                        <small>Credibility</small>
                    </div>
                </div>

                <div class="section">
                    <h4>📊 Sentiment</h4>
                    <p id="sentimentResult">--</p>
                </div>

                <div class="section">
                    <h4>😊 Emotions Detected</h4>
                    <div id="emotionsResult">--</div>
                </div>

                <div class="section">
                    <h4>⚠️ Risk Flags</h4>
                    <div id="flagsResult">--</div>
                </div>

                <div class="section">
                    <h4>💡 Recommendations</h4>
                    <div id="recommendationsResult">--</div>
                </div>
            </div>

            <div id="error" class="error-box hidden">
                <p id="errorMessage">An error occurred</p>
            </div>
        </div>

        <div class="footer">
            <p>Connect to your VeracityX API to analyze content</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
